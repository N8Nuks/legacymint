<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegacyMint</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #0a0a0a;
  color: white;
  text-align: center;
  padding: 60px 20px;
}

h1 {
  font-size: 5em;
  margin: 0;
  color: #00ff9d;
}

p {
  font-size: 1.6em;
  max-width: 700px;
  margin: 30px auto;
}
  
.btn {
  background-color: #00ff9d;
  color: black;
  padding: 18px 40px;
  font-size: 1.4em;
  border-radius: 50px;
  text-decoration: none;
  display: inline-block;
  margin: 30px 10px;
  font-weight: bold;
}

.btn2 {
  background-color: transparent;
  border: 2px solid #00ff9d;
  color: #00ff9d;
}

.logo {
  width: 320px;
  max-width: 85%;
  height: auto;
  margin-bottom: 40px;
  border-radius: 24px;
  box-shadow: 0 0 40px rgba(0,255,157,0.18);
}

.wallet-btn {
  background-color: #f6851b;
  color: white;
  padding: 18px 40px;
  font-size: 1.2em;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  margin-top: 20px;
  font-weight: bold;
}

.wallet-btn:hover {
  opacity: 0.9;
}

<script>
async function connectWallet() {
  if (typeof window.ethereum !== 'undefined') {
    try {
      const accounts = await window.ethereum.request({
        method: 'eth_requestAccounts'
      });
      alert("Connected: " + accounts[0]);
    } catch (error) {
      console.log(error);
      alert("Connection failed");
    }
  } else {
    alert("MetaMask not detected");
  }
}
</script>

</body>
</html>
</style>
</head>
<body>
  
<img src="044ada2b-fc5f-4304-8470-a291e0bd96c4.jpg" alt="LegacyMint Logo" class="logo">

<h1>LegacyMint</h1>
<p>Exclusive NFT collections for athletes and creators on Apertum</p>
<p>Simple fundraising. Real value. Limited editions.</p>
<a href="#" class="btn">Browse Campaigns</a>
<a href="#" class="btn btn2">Create Collection</a>
<button class="wallet-btn" onclick="connectWallet()">
  Connect Wallet
</button>
</body>
</html>
