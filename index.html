<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy Mint Club</title>

<style>
   body {
     margin: 0;
     font-family: Arial, sans-serif;
     background: linear-gradient(135deg, #050505, #111827);
     color: white;
     display: flex;
     justify-content: center;
     align-items: center;
     min-height: 100vh;
     padding: 20px;
   }

   .card {
     max-width: 700px;
     text-align: center;
     padding: 50px 35px;
     border-radius: 24px;
     background: rgba(255,255,255,0.05);
     border: 1px solid rgba(255,255,255,0.1);
     box-shadow: 0 20px 60px rgba(0,0,0,0.4);
   }

   h1 {
     font-size: 52px;
     margin-bottom: 15px;
   }

   .subtitle {
     color: #facc15;
     font-size: 22px;
     margin-bottom: 20px;
   }

   p {
     color: #d1d5db;
     line-height: 1.7;
     font-size: 17px;
   }

   .badge {
     margin-top: 25px;
     display: inline-block;
     padding: 10px 18px;
     border-radius: 999px;
     border: 1px solid rgba(250,204,21,0.4);
     color: #facc15;
     background: rgba(250,204,21,0.1);
     font-weight: bold;
     font-size: 14px;
   }

   .buttons {
     margin-top: 35px;
   }

   .btn {
     display: inline-block;
     padding: 14px 24px;
     margin: 8px;
     border-radius: 12px;
     text-decoration: none;
     font-weight: bold;
   }

   .primary {
     background: #facc15;
     color: #111827;
   }

   .secondary {
     border: 1px solid rgba(255,255,255,0.2);
     color: white;
   }
</style>
</head>

<body>

<div class="card">

<h1>Legacy Mint Club</h1>

<div class="subtitle">
     Digital Collectibles on Apertum
</div>

<p>
     Legacy Mint Club is a home for exclusive NFT collections,
     creator drops, and blockchain-powered digital assets.
</p>

<div class="badge">
     ERC-1155 Contract Live
</div>

<div class="buttons">
<a class="btn primary" href="#">
       View Collection
</a>

<a class="btn secondary" href="#">
       Learn More
</a>
</div>

</div>

</body>
</html>
