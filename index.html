<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LegacyMint</title>

<meta name="robots" content="noindex,nofollow">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #0a0a0a;
  color: white;
  text-align: center;
  padding: 60px 20px;
}

h1 {
  font-size: 5em;
  margin: 0;
  color: #00ff9d;
}

p {
  font-size: 1.6em;
  max-width: 700px;
  margin: 30px auto;
}

.btn {
  background-color: #00ff9d;
  color: black;
  padding: 18px 40px;
  font-size: 1.4em;
  border-radius: 50px;
  text-decoration: none;
  display: inline-block;
  margin: 30px 10px;
  font-weight: bold;
}

.btn2 {
  background-color: transparent;
  border: 2px solid #00ff9d;
  color: #00ff9d;
}

.logo {
  width: 320px;
  max-width: 85%;
  height: auto;
  margin-bottom: 40px;
  border-radius: 24px;
  box-shadow: 0 0 40px rgba(0,255,157,0.18);
}

.wallet-btn {
  background-color: #f6851b;
  color: white;
  padding: 18px 40px;
  font-size: 1.2em;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  margin-top: 20px;
  font-weight: bold;
}

.wallet-btn:hover {
  opacity: 0.9;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.overlay-box {
  background: #111;
  padding: 50px;
  border-radius: 24px;
  text-align: center;
  max-width: 500px;
  border: 1px solid rgba(0,255,157,0.3);
  box-shadow: 0 0 40px rgba(0,255,157,0.15);
}

.overlay-box h2 {
  color: #00ff9d;
  margin-bottom: 20px;
  font-size: 2.5em;
}

.overlay-box p {
  font-size: 1.1em;
  line-height: 1.6;
}

.overlay-box button {
  background-color: #00ff9d;
  color: black;
  border: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-size: 1em;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
}

</style>
</head>

<body>

<div class="overlay">
  <div class="overlay-box">

    <h2>LegacyMint Beta</h2>

    <p>
      Platform currently in closed testing.<br>
      NFT minting and creator onboarding are not yet public.
    </p>

    <button onclick="closeOverlay()">
      Enter Site
    </button>

  </div>
</div>

<img src="044ada2b-fc5f-4304-8470-a291e0bd96c4.jpg" alt="LegacyMint Logo" class="logo">

<h1>LegacyMint</h1>

<p>
Exclusive NFT collections for athletes and creators on Apertum
</p>

<p>
Simple fundraising. Real value. Limited editions.
</p>

<a href="#" class="btn">
Browse Campaigns
</a>

<a href="#" class="btn btn2">
Create Collection
</a>

<br>

<button class="wallet-btn" onclick="connectWallet()">
Connect Wallet
</button>

<script>

function closeOverlay() {
  document.querySelector('.overlay').style.display = 'none';
}

async function connectWallet() {

  if (typeof window.ethereum !== 'undefined') {

    try {

      const accounts = await window.ethereum.request({
        method: 'eth_requestAccounts'
      });

      alert("Connected: " + accounts[0]);

    } catch (error) {

      console.log(error);

      alert("Connection failed");

    }

  } else {

    alert("MetaMask not detected");

  }

}

</script>

</body>
</html>
